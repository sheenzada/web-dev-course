<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">

        <h1 class="heading">Temperature Converter</h1>

        <div class="temp-container">

            <label for="celsius">Celsius</label>

            <input type="number"
            oninput="computeTemp(event)"
            name="celsius"
            id="celsius"
            placeholder="Enter Temperature"
            class="input"
            
            />
        </div>

        <div class="temp-container">

            <label for="fahrenheit">Fahrenheit:</label>

            <input type="number"
             oninput="computeTemp(event)"
            name="fahrenheit"
            id="fahrenheit"
            placeholder="Enter Temperature"
            class="input"
            />
        </div>

        <div class="temp-container">

            <label for="kelvin">Kelvin:</label>

            <input type="number"
            oninput="computeTemp(event)"
            name="kelvin"
            id="kelvin"
            placeholder="Enter Temperature"
            class="input"
            >
        </div>

        <button class="reset-btn" onclick="resetFileds()">Reset</button>
        <footer>Made by Inam-Ullah</footer>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
