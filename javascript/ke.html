<script>
const display = document.getElementById('display');
const keys = document.querySelectorAll('.key');

let capsLock = false;
let shiftPressed = false;

/* =============================
   SHIFT SYMBOL MAP
============================= */
const shiftMap = {
    '1': '!',
    '2': '@',
    '3': '#',
    '4': '$',
    '5': '%',
    '6': '^',
    '7': '&',
    '8': '*',
    '9': '(',
    '0': ')',
    '-': '_',
    '=': '+',
    '[': '{',
    ']': '}',
    '\\': '|',
    ';': ':',
    "'": '"',
    ',': '<',
    '.': '>',
    '/': '?',
    '`': '~'
};

/* =============================
   INSERT TEXT AT CURSOR
============================= */
function insertAtCursor(text) {
    const start = display.selectionStart;
    const end = display.selectionEnd;

    display.value =
        display.value.substring(0, start) +
        text +
        display.value.substring(end);

    display.selectionStart = display.selectionEnd = start + text.length;
    display.focus();
}

/* =============================
   KEY HANDLER
============================= */
function handleKey(key) {

    const val = key.toLowerCase();

    if (val === 'backspace') {
        const start = display.selectionStart;
        const end = display.selectionEnd;

        if (start === end && start > 0) {
            display.value =
                display.value.substring(0, start - 1) +
                display.value.substring(end);
            display.selectionStart = display.selectionEnd = start - 1;
        } else {
            insertAtCursor('');
        }

    } else if (val === 'delete') {
        const start = display.selectionStart;
        const end = display.selectionEnd;

        if (start === end) {
            display.value =
                display.value.substring(0, start) +
                display.value.substring(start + 1);
        } else {
            insertAtCursor('');
        }

    } else if (val === 'enter') {
        insertAtCursor('\n');

    } else if (val === 'space') {
        insertAtCursor(' ');

    } else if (val === 'tab') {
        insertAtCursor('    ');

    } else if (val === 'caps lock') {
        capsLock = !capsLock;
        highlightKey('caps lock', capsLock);

    } else if (val === 'shift') {
        shiftPressed = true;
        highlightKey('shift', true);

    } else if (val === '←') {
        display.selectionStart = display.selectionEnd =
            Math.max(0, display.selectionStart - 1);

    } else if (val === '→') {
        display.selectionStart = display.selectionEnd =
            Math.min(display.value.length, display.selectionStart + 1);

    } else if (val === '↑') {
        display.selectionStart = display.selectionEnd = 0;

    } else if (val === '↓') {
        display.selectionStart = display.selectionEnd = display.value.length;

    } else if (key.length === 1) {

        let output = key;

        if (shiftPressed && shiftMap[key]) {
            output = shiftMap[key];
        } else if (
            (capsLock && !shiftPressed) ||
            (!capsLock && shiftPressed)
        ) {
            output = key.toUpperCase();
        }

        insertAtCursor(output);

        shiftPressed = false;
        highlightKey('shift', false);
    }

    display.scrollTop = display.scrollHeight;
}

/* =============================
   VISUAL KEY HIGHLIGHT
============================= */
function highlightKey(name, state) {
    keys.forEach(k => {
        if (k.innerText.toLowerCase() === name) {
            if (state) {
                k.classList.add('active');
            } else {
                k.classList.remove('active');
            }
        }
    });
}

/* =============================
   MOUSE CLICK
============================= */
keys.forEach(key => {
    key.addEventListener('mousedown', () => {
        handleKey(key.innerText.trim());
    });

    key.addEventListener('mouseup', () => {
        if (key.innerText.toLowerCase() === 'shift') {
            shiftPressed = false;
            highlightKey('shift', false);
        }
    });
});

/* =============================
   PHYSICAL KEYBOARD SYNC
============================= */
window.addEventListener('keydown', (e) => {
    let keyName = e.key;

    if (keyName === ' ') keyName = 'space';
    if (keyName === 'CapsLock') {
        capsLock = !capsLock;
        highlightKey('caps lock', capsLock);
    }

    keys.forEach(k => {
        if (k.innerText.toLowerCase() === keyName.toLowerCase()) {
            k.classList.add('active');
        }
    });
});

window.addEventListener('keyup', () => {
    keys.forEach(k => k.classList.remove('active'));
});
</script>
