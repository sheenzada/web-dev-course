<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Scientific Calculator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #020617);
}

.calculator {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    width: 340px;
    box-shadow: 0 0 40px rgba(0,255,150,0.2);
}

.display {
    width: 100%;
    height: 70px;
    border: none;
    outline: none;
    font-size: 28px;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 15px;
    text-align: right;
    background: rgba(0,0,0,0.4);
    color: #00ff9c;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00ff9c;
    color: black;
    transform: scale(1.05);
}

.equal {
    grid-column: span 2;
    background: #00ff9c;
    color: black;
}

.equal:hover {
    background: #00cc7a;
}

.clear {
    background: #ff4d4d;
}

.clear:hover {
    background: #cc0000;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('/')">÷</button>
        <button class="clear" onclick="clearDisplay()">C</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('*')">×</button>
        <button onclick="press('**')">x²</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('-')">−</button>
        <button onclick="press('sqrt(')">√</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="press('+')">+</button>
        <button onclick="press('Math.PI')">π</button>
        <button onclick="press('Math.E')">e</button>

        <button onclick="press('sin(')">sin</button>
        <button onclick="press('cos(')">cos</button>
        <button onclick="press('tan(')">tan</button>
        <button onclick="press('log(')">log</button>
        <button onclick="press('Math.log(')">ln</button>

        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
function press(val) {
    document.getElementById("display").value += val;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        let expr = document.getElementById("display").value;

        // Replace scientific functions
        expr = expr.replace(/sin/g, "Math.sin");
        expr = expr.replace(/cos/g, "Math.cos");
        expr = expr.replace(/tan/g, "Math.tan");
        expr = expr.replace(/log/g, "Math.log10");
        expr = expr.replace(/sqrt/g, "Math.sqrt");

        let result = eval(expr);
        document.getElementById("display").value = result;
    } catch {
        document.getElementById("display").value = "Error";
    }
}
</script>

</body>
</html>
