<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    var a = prompt("Enter first number : ")
    var b = prompt("Enter first second : ")
    var c = prompt("Enter first third : ")
    if(a>b && b>c){
        document.write("Greater is A",a)
    } else if (b>a && b>c){
        document.write("Greater is B ",b)
    }else{
        document.write("Greater is C " , c)
    }

    </script>
</body>
</html>
