<body>
    <script>
        function inam(){
            const start = 1;
            const step = 2; 
            const length = 10;
            let series = [];
            for (let i = 0 ; i < length ; i++){
                series.push(start+i*step);
                document.getElementById('output').innerText = series.join(',')
            }
        }
    </script>
